name: Vulture 10K Engine - Professional Scale

on:
  schedule:
    # Runs daily at 04:00 UTC
    - cron: "0 4 * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vulture-engine
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Upgrade Pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found"
          fi

      - name: Configure Git
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "engine@nexusdistro.io"

      - name: Sync Latest Remote Changes
        run: |
          git fetch origin main
          git checkout main
          git pull --rebase origin main

      - name: Verify Repository Files
        run: |
          ls -la

      - name: Run Vulture 10K Engine
        run: |
          if [ -f vulture_gen.py ]; then
            python vulture_gen.py
          else
            echo "vulture_gen.py missing"
          fi

          if [ -f social_gen.py ]; then
            python social_gen.py
          else
            echo "social_gen.py missing"
          fi

          if [ -f ai_feed_gen.py ]; then
            python ai_feed_gen.py
          else
            echo "ai_feed_gen.py missing"
          fi

      - name: Commit Changes
        shell: bash
        run: |
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Vulture 10K Refresh: $(date)"

      - name: Safe Push Retry Loop
        shell: bash
        run: |
          for i in 1 2 3 4 5; do
            echo "Push attempt $i"

            git pull --rebase origin main || {
              echo "Rebase failed. Aborting..."
              git rebase --abort || true
              sleep 5
              continue
            }

            if git push origin main; then
              echo "Push successful."
              exit 0
            fi

            echo "Push rejected. Retrying..."
            sleep 5
          done

          echo "Failed to push after multiple attempts."
          exit 1

      - name: Workflow Finished
        run: |
          echo "Vulture 10K Engine completed successfully"
