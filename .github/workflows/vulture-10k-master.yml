name: Vulture 10K Engine - Professional Scale

on:
  schedule:
    # Runs daily at 04:00 UTC
    - cron: "0 4 * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vulture-engine
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Upgrade Pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found"
          fi

      - name: Verify Repository Files
        run: |
          ls -la

      - name: Sync Latest Remote Changes
        run: |
          git fetch origin
          git checkout main
          git pull origin main --rebase

      - name: Run Vulture 10K Engine
        run: |
          if [ -f vulture_gen.py ]; then
            python vulture_gen.py
          else
            echo "vulture_gen.py missing"
          fi

          if [ -f social_gen.py ]; then
            python social_gen.py
          else
            echo "social_gen.py missing"
          fi

          if [ -f ai_feed_gen.py ]; then
            python ai_feed_gen.py
          else
            echo "ai_feed_gen.py missing"
          fi

      - name: Configure Git
        run: |
          git config --global user.name "NexusDistro-Bot"
          git config --global user.email "engine@nexusdistro.io"

      - name: Commit Changes
        run: |
          git add .

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Vulture 10K: Automated Daily Refresh [$(date +'%Y-%m-%d')]"

      - name: Pull Latest Changes Before Push
        run: |
          git pull origin main --rebase

      - name: Push Changes
        run: |
          git push origin main

      - name: Workflow Finished
        run: |
          echo "Vulture 10K Engine completed successfully"
