name: Vulture 10K Engine - Professional Scale

on:
  schedule:
    # Runs at 04:00 UTC (12:00 AM EST) to stay ahead of peak traffic
    - cron: '0 4 * * *'
  workflow_dispatch: # Manual "Generate" button

# Prevent multiple runs from overlapping and corrupting the 10K database
concurrency:
  group: vulture-engine
  cancel-in-progress: true

jobs:
  build_network:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Shallow clone to save speed at 10K scale

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up repeated runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Add 'requests' or 'pandas' here if your 10K script needs them

      - name: Run Vulture 10K Engine
        run: |
          # Executes the Hub, 10K Blog, and AI-Discovery feeds
          python vulture_gen.py
          python social_gen.py
          python ai_feed_gen.py

      - name: Deploy 10K Architecture
        run: |
          git config --global user.name "Vulture-10K-Bot"
          git config --global user.email "engine@nexusdistro.io"
          
          # Use a bulk add to handle the 10,000 file index efficiently
          git add .
          
          # Only commit if changes exist to avoid empty builds
          if git diff --staged --quiet; then
            echo "No changes detected in the 10K network."
          else
            git commit -m "Vulture 10K: Automated Daily Refresh [$(date +'%Y-%m-%d')]"
            git push origin main
          fi
