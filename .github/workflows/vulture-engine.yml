name: Vulture 10K Engine

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: 

jobs:
  build_network:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # We have removed the 'cache' parameter entirely to stop the error

      - name: Run Core Engine
        run: |
          python vulture_gen.py || echo "Main engine skipped"
          python social_gen.py || echo "Social engine skipped"
          python ai_feed_gen.py || echo "AI feed engine skipped"

      - name: Deploy Changes
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "engine@nexusdistro.io"
          git add .
          git commit -m "Vulture 10K Refresh: $(date)" || echo "No changes to commit"
          git push
