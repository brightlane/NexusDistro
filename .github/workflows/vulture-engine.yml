name: Vulture 10K Engine

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 4 * * *'

jobs:
  build_network:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull Code
        uses: actions/checkout@v4

      - name: 2. Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Execute Vulture Scripts
        run: |
          python vulture_gen.py || echo "vulture_gen failed"
          python social_gen.py || echo "social_gen failed"
          python ai_feed_gen.py || echo "ai_feed_gen failed"

      - name: 4. Commit and Push
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "bot@nexusdistro.com"
          git add .
          git commit -m "Engine Refresh $(date)" || echo "Nothing to update"
          git push
